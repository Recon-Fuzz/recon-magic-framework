<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="app" class="max-w-7xl mx-auto p-8">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Workflow Studio</h1>
            <p class="text-gray-600">Create and edit recon-magic workflows (auto-syncs with type.ts)</p>
        </header>

        <!-- Loading state -->
        <div id="loadingTypes" class="bg-blue-50 border border-blue-200 rounded-lg p-6 text-center mb-6">
            <p class="text-blue-800">Loading type definitions from ../type.ts...</p>
        </div>

        <div id="mainUI" class="grid grid-cols-2 gap-6 hidden">
            <!-- Editor Panel -->
            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-bold mb-4">Import/Create</h2>

                    <button onclick="createNew()" class="w-full mb-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                        Create New Workflow
                    </button>

                    <div class="border-t pt-4">
                        <label class="block text-sm font-medium mb-2">Import Existing</label>
                        <textarea
                            id="importJson"
                            placeholder="Paste workflow JSON here..."
                            class="w-full h-32 p-3 border rounded font-mono text-sm"
                        ></textarea>
                        <button onclick="importWorkflow()" class="mt-2 px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                            Import
                        </button>
                    </div>
                </div>

                <!-- Workflow Editor -->
                <div id="editor" class="bg-white rounded-lg shadow p-6 hidden">
                    <h2 class="text-xl font-bold mb-4">Workflow Details</h2>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Workflow Name</label>
                            <input
                                id="workflowName"
                                type="text"
                                class="w-full px-3 py-2 border rounded"
                                oninput="updatePreview()"
                            />
                        </div>

                        <div class="border-t pt-4">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold">Steps</h3>
                                <div class="space-x-2">
                                    <button onclick="addStep('task')" class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
                                        + Add Task
                                    </button>
                                    <button onclick="addStep('decision')" class="px-3 py-1 bg-purple-600 text-white text-sm rounded hover:bg-purple-700">
                                        + Add Decision
                                    </button>
                                </div>
                            </div>
                            <div id="stepsList" class="space-y-4"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="space-y-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">Live Preview</h2>
                        <div class="flex gap-2">
                            <button onclick="copyToClipboard()" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 transition-colors" id="copyButton">
                                Copy
                            </button>
                            <button onclick="exportWorkflow()" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">
                                Export JSON
                            </button>
                        </div>
                    </div>
                    <pre id="preview" class="bg-gray-100 p-4 rounded overflow-auto text-xs max-h-[600px]">
// Create or import a workflow to see preview
                    </pre>
                </div>
            </div>
        </div>
    </div>

    <script src="type-parser.js"></script>
    <script src="editor-dynamic.js"></script>
</body>
</html>
