name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - '.github/workflows/docker-build-push.yml'
      - '**/*.py'
      - 'pyproject.toml'
      - 'runner/**'
      - 'backend/**'
      - 'prisma/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --secret id=npm_token,env=NPM_TOKEN \
            -t registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/recon-magic-framework:$(echo $GITHUB_SHA | head -c7) .
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag as latest
        run: docker tag registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/recon-magic-framework:$(echo $GITHUB_SHA | head -c7) registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/recon-magic-framework:latest

      - name: Push image to DigitalOcean Container Registry
        run: |
          docker push registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/recon-magic-framework:$(echo $GITHUB_SHA | head -c7)
          docker push registry.digitalocean.com/${{ secrets.REGISTRY_NAME }}/recon-magic-framework:latest
